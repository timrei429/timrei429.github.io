<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Geschenk Keckispatzi</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: black;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>

<img id="bild" src="bild1.png">

<script>
  const bilder = ["bild1.png", "bild2.png", "bild3.png", "bild4.png"];
  let index = 0;

  document.getElementById("bild").addEventListener("click", () => {
    index = (index + 1) % bilder.length;
    document.getElementById("bild").src = bilder[index];
  });
</script>

</body>
</html>
